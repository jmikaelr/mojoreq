name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      run_live:
        description: Run live internet integration tests
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "0 6 * * *"

jobs:
  test:
    name: Unit + Local Integration (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.8.14

      - name: Unit Tests
        run: pixi run test

      - name: Local Integration Tests
        run: pixi run test-integration

  integration-live:
    name: Live Integration (opt-in)
    runs-on: ubuntu-latest
    needs:
      - test
      - benchmark
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_live) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.8.14

      - name: Live Integration Tests
        run: pixi run test-integration-live

  benchmark:
    name: Pool Benchmark Guard (ubuntu-latest)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.8.14

      - name: Pool Benchmark Guard
        env:
          MOJOREQ_BENCH_ITERATIONS: "25"
          MOJOREQ_BENCH_ROUNDS: "3"
          MOJOREQ_BENCH_MAX_REGRESSION_PCT: "25"
        run: pixi run benchmark
