name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  verify:
    name: Verify Before Release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.8.14

      - name: Unit Tests
        run: pixi run test

      - name: README Smoke Test
        run: pixi run test-smoke

      - name: Local Integration Tests
        run: pixi run test-integration

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: verify
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Release Archive
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          mkdir -p dist
          tar -czf "dist/mojoreq-${TAG}.tar.gz" \
            README.md \
            LICENSE \
            CHANGELOG.md \
            pixi.toml \
            pixi.lock \
            src \
            tests

      - name: Extract Release Notes From Changelog
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          awk -v tag="$TAG" '
            $0 ~ "^## \\[" tag "\\]" {in_section=1; next}
            $0 ~ "^## \\[" && in_section {exit}
            in_section {print}
          ' CHANGELOG.md > dist/release-notes.md

          if [ ! -s dist/release-notes.md ]; then
            echo "Release ${GITHUB_REF_NAME}" > dist/release-notes.md
            echo "" >> dist/release-notes.md
            echo "No changelog section found for ${TAG}." >> dist/release-notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body_path: dist/release-notes.md
          files: |
            dist/mojoreq-${{ github.ref_name }}.tar.gz
